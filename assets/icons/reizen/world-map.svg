<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wereldkaart">
  <!--
    Deliberately a STYLIZED backdrop, not geographically precise country
    borders (rendering accurate borders inline would need a real GeoJSON
    dataset this template doesn't ship). Country pins in
    assets/data/travel-countries.json are positioned by percentage over
    this canvas and are what's actually clickable/meaningful — this SVG
    is just pretty, theme-colored scenery behind them. Fill color is
    intentionally controlled by the page's CSS (currentColor), so it
    follows light/dark + blue/pink themes automatically.
  -->
  <g fill="currentColor" opacity="0.9">
    <!-- North America -->
    <path d="M60,90 C110,70 170,75 210,95 C240,110 250,140 230,165 C245,180 235,210 205,215 C215,235 195,255 170,245 C150,260 120,250 115,225 C90,220 75,195 90,170 C65,160 55,130 75,110 C65,105 55,98 60,90 Z" />
    <!-- Central America sliver -->
    <path d="M175,245 C185,255 190,268 180,278 C170,272 165,258 175,245 Z" />
    <!-- South America -->
    <path d="M195,270 C230,260 260,275 265,305 C280,320 275,355 255,375 C260,400 240,430 215,425 C205,445 180,440 175,415 C155,400 155,365 175,345 C165,320 175,290 195,270 Z" />
    <!-- Europe -->
    <path d="M470,80 C500,65 540,68 565,85 C590,80 615,95 610,115 C625,125 615,145 595,145 C598,160 580,170 565,160 C545,175 520,165 518,148 C495,150 475,135 480,115 C460,110 455,90 470,80 Z" />
    <!-- Africa -->
    <path d="M490,180 C540,165 590,175 610,205 C630,220 630,255 610,275 C620,305 605,340 580,345 C575,375 545,395 520,380 C495,395 470,375 475,345 C455,330 455,295 475,270 C460,245 465,210 490,180 Z" />
    <!-- Asia -->
    <path d="M600,70 C670,50 760,55 830,80 C880,85 920,105 910,135 C935,150 925,180 895,185 C900,205 875,220 850,210 C845,230 815,235 800,215 C770,225 740,210 745,185 C710,195 675,180 675,155 C645,160 615,140 620,115 C595,110 585,90 600,70 Z" />
    <!-- India sliver -->
    <path d="M700,190 C715,195 722,215 710,232 C698,228 692,205 700,190 Z" />
    <!-- Southeast Asia / Indonesia -->
    <path d="M760,235 C790,225 830,232 845,250 C825,262 785,262 760,250 C755,244 755,238 760,235 Z" />
    <!-- Australia -->
    <path d="M820,320 C860,308 905,315 920,340 C930,360 910,382 880,380 C855,392 825,378 822,358 C805,352 805,332 820,320 Z" />
    <!-- Greenland -->
    <path d="M330,45 C355,35 385,40 390,60 C400,75 385,90 365,85 C345,92 325,80 328,62 C320,55 322,48 330,45 Z" />
  </g>
</svg>
