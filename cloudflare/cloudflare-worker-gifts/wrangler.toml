name = "gifts"
main = "worker.js"
compatibility_date = "2025-01-01"

# Binds your KV namespace to this worker as `env.GIFTS_KV`. Create the
# namespace first (Cloudflare dashboard > Workers & Pages > KV >
# Create namespace), then either fill in its id below and run
# `wrangler deploy`, OR just add the binding via the dashboard
# (Worker > Settings > Bindings > KV Namespace) if you're not using
# the CLI — see STAPPENPLAN-GIFTS.md.
[[kv_namespaces]]
binding = "GIFTS_KV"
id = "YOUR-KV-NAMESPACE-ID"

# Binds your (public, no-login) R2 bucket for OPTIONAL custom gift
# photos to this worker as `env.GIFTS_BUCKET`. Create the bucket
# first (Cloudflare dashboard > R2 > Create bucket), then either fill
# in its name below and run `wrangler deploy`, OR just add the
# binding via the dashboard (Worker > Settings > Bindings > R2
# Bucket) — see STAPPENPLAN-GIFTS.md.
[[r2_buckets]]
binding = "GIFTS_BUCKET"
bucket_name = "gifts"

# No secrets needed for this worker — like the shopping list, the
# gift list itself isn't sensitive, so unlike the photo gallery
# there's no login here.
