name = "boodschappenlijst"
main = "worker.js"
compatibility_date = "2025-01-01"

# Binds your KV namespace to this worker as `env.LIST_KV`. Create the
# namespace first (Cloudflare dashboard > Workers & Pages > KV >
# Create namespace), then either fill in its id below and run
# `wrangler deploy`, OR just add the binding via the dashboard
# (Worker > Settings > Bindings > KV Namespace) if you're not using
# the CLI — see STAPPENPLAN-BOODSCHAPPEN.md.
[[kv_namespaces]]
binding = "LIST_KV"
id = "YOUR-KV-NAMESPACE-ID"

# No secrets needed for this worker — the list itself isn't
# sensitive, so unlike the photo gallery there's no login here.
